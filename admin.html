<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WelcomScreen — Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --surface2: #1f2937; --border: #2d3748;
            --accent: #6366f1; --accent2: #818cf8; --success: #10b981; --danger: #ef4444;
            --text: #f1f5f9; --muted: #94a3b8; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

        /* AUTH */
        #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at 50% 0%, #1e1b4b 0%, var(--bg) 70%); }
        .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,.5); }
        .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; cursor: pointer; }
        .auth-logo .logo-icon { width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .auth-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
        .field input, .field select, .field textarea { width: 100%; padding: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: .2s; width: 100%; }
        .btn-primary { background: var(--accent); color: #fff; margin-bottom: 12px; }
        .btn-google { background: #fff; color: #000; margin-top: 10px; border: 1px solid #ddd; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; }

        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--muted); font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* APP */
        #app-screen { display: none; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .topbar-left { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 12px; margin-top: 20px; }
        .store-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; }
        .store-card:hover { border-color: var(--accent); }
        .hidden { display: none !important; }
        .msg { font-size: 13px; padding: 10px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .msg.error { background: rgba(239,68,68,.15); color: #fca5a5; display: block; border: 1px solid var(--danger); }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--success); color: #6ee7b7; padding: 12px 18px; border-radius: 10px; transform: translateY(100px); transition: .3s; }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">📺</div>
            <div><h1>WelcomScreen</h1></div>
        </div>
        <div id="login-form">
            <p class="auth-title">Connexion</p>
            <div id="login-msg" class="msg"></div>
            <div class="field"><label>Email</label><input type="email" id="login-email" /></div>
            <div class="field"><label>Mot de passe</label><input type="password" id="login-pwd" /></div>
            <button class="btn btn-primary" onclick="doLogin()">Se connecter</button>
            <div class="divider">OU</div>
            <button class="btn btn-google" onclick="doGoogleLogin()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/button/google/utils/google_logo.svg" width="18" /> Continuer avec Google
            </button>
            <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--muted)">
                Pas de compte ? <a onclick="toggleAuth('register')" style="color:var(--accent2); cursor:pointer">Créer un compte</a>
            </p>
        </div>
        <div id="register-form" class="hidden">
            <p class="auth-title">Inscription</p>
            <div class="field"><label>Email</label><input type="email" id="reg-email" /></div>
            <div class="field"><label>Mot de passe</label><input type="password" id="reg-pwd" /></div>
            <button class="btn btn-primary" onclick="doRegister()">Créer mon compte</button>
            <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--muted)">
                Déjà inscrit ? <a onclick="toggleAuth('login')" style="color:var(--accent2); cursor:pointer">Se connecter</a>
            </p>
        </div>
    </div>
</div>

<div id="app-screen">
    <div class="topbar">
        <div class="topbar-left" onclick="window.location.href='index.html'">
            <div class="logo-icon" style="width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:14px">📺</div>
            <h2 style="font-size:16px">WelcomScreen</h2>
        </div>
        <div><button class="btn btn-secondary btn-sm" onclick="doLogout()">Déconnexion</button></div>
    </div>
    <div class="container" id="store-selector">
        <p style="font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px">Mes établissements</p>
        <div class="store-grid" id="store-grid"></div>
    </div>
    <!-- L'éditeur (simplifié pour l'exemple, conservez votre logique de tabs actuelle) -->
    <div id="editor" class="container hidden">
        <button class="btn btn-secondary btn-sm" onclick="backToStores()">← Retour</button>
        <h2 id="editor-title" style="margin:20px 0"></h2>
        <div id="slides-list" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px"></div>
        <button class="btn btn-primary btn-sm" id="add-slide-btn" onclick="openSlideEditor(-1)">+ Ajouter une slide</button>
    </div>
</div>

<div id="toast" class="toast">Enregistré ✓</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBGjPegcDDlqqrltWhhWaWHBxPw2JxYC2Q",
        authDomain: "welcomscreen-b6bff.firebaseapp.com",
        databaseURL: "https://welcomscreen-b6bff-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "welcomscreen-b6bff",
        storageBucket: "welcomscreen-b6bff.firebasestorage.app",
        messagingSenderId: "801754342081",
        appId: "1:801754342081:web:26f60f9b66589e690daa40"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;
    let currentStore = null;

    // --- AUTHENTIFICATION ---
    window.doLogin = async () => {
        const email = document.getElementById('login-email').value;
        const pwd = document.getElementById('login-pwd').value;
        try { await signInWithEmailAndPassword(auth, email, pwd); } 
        catch(e) { showAuthError(e.code); }
    };

    window.doGoogleLogin = async () => {
        const provider = new GoogleAuthProvider();
        try { await signInWithPopup(auth, provider); }
        catch(e) { showAuthError(e.code); }
    };

    window.doRegister = async () => {
        const email = document.getElementById('reg-email').value;
        const pwd = document.getElementById('reg-pwd').value;
        try { await createUserWithEmailAndPassword(auth, email, pwd); }
        catch(e) { showAuthError(e.code); }
    };

    window.doLogout = () => signOut(auth);

    onAuthStateChanged(auth, user => {
        currentUser = user;
        document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
        document.getElementById('app-screen').style.display = user ? 'block' : 'none';
        if (user) loadStores();
    });

    // --- LOGIQUE ÉTABLISSEMENTS ---
    async function loadStores() {
        const snap = await get(ref(db, 'stores'));
        const grid = document.getElementById('store-grid');
        grid.innerHTML = `<div class="store-card" onclick="openNewStore()" style="border-style:dashed; text-align:center">+ Nouvel établissement</div>`;
        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([id, data]) => {
                if (data.ownerId === currentUser.uid) {
                    const card = document.createElement('div');
                    card.className = 'store-card';
                    card.innerHTML = `<h3>${data.name}</h3><p style="font-size:12px; color:var(--muted)">${(data.slides||[]).length} slides</p>`;
                    card.onclick = () => openStore(id, data);
                    grid.prepend(card);
                }
            });
        }
    }

    window.openNewStore = async () => {
        const name = prompt("Nom de l'établissement :");
        if (!name) return;
        const id = 'store_' + Date.now();
        const data = { name, ownerId: currentUser.uid, slides: [], theme: 'dark', duration: 8 };
        await set(ref(db, `stores/${id}`), data);
        loadStores();
    };

    window.openStore = (id, data) => {
        currentStore = { id, ...data, slides: data.slides || [] };
        document.getElementById('store-selector').classList.add('hidden');
        document.getElementById('editor').classList.remove('hidden');
        document.getElementById('editor-title').textContent = data.name;
        renderSlides();
    };

    window.backToStores = () => {
        document.getElementById('store-selector').classList.remove('hidden');
        document.getElementById('editor').classList.add('hidden');
        loadStores();
    };

    function renderSlides() {
        const list = document.getElementById('slides-list');
        list.innerHTML = '';
        const MAX_SLIDES = 3; // LIMITE PLAN GRATUIT [8]
        currentStore.slides.forEach((s, i) => {
            const item = document.createElement('div');
            item.style = "background:var(--surface2); padding:12px; border-radius:8px; display:flex; justify-content:space-between";
            item.innerHTML = `<span>${i+1}. ${s.title || s.type}</span><button class="btn btn-danger btn-sm" onclick="removeSlide(${i})">✕</button>`;
            list.appendChild(item);
        });
        document.getElementById('add-slide-btn').style.display = currentStore.slides.length >= MAX_SLIDES ? 'none' : 'block';
    }

    // --- HELPERS ---
    function showAuthError(code) {
        const msg = document.getElementById('login-msg');
        msg.textContent = code === 'auth/invalid-credential' ? "Identifiants incorrects" : "Erreur de connexion";
        msg.className = "msg error";
    }

    window.toggleAuth = (mode) => {
        document.getElementById('login-form').classList.toggle('hidden', mode === 'register');
        document.getElementById('register-form').classList.toggle('hidden', mode === 'login');
    };
</script>
</body>
</html>
