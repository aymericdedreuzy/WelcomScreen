  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body[data-theme="dark"]   { --bg:#0d1117; --bg2:#161b22; --text:#f1f5f9; --muted:#94a3b8; --accent:#6366f1; --accent2:#a5b4fc; }
    body[data-theme="light"]  { --bg:#f8fafc; --bg2:#e2e8f0; --text:#0f172a; --muted:#64748b; --accent:#4f46e5; --accent2:#6366f1; }
    body[data-theme="warm"]   { --bg:#1c0a00; --bg2:#451a03; --text:#fef3c7; --muted:#d97706; --accent:#f59e0b; --accent2:#fcd34d; }
    body[data-theme="ocean"]  { --bg:#062032; --bg2:#0c4a6e; --text:#e0f2fe; --muted:#7dd3fc; --accent:#0ea5e9; --accent2:#38bdf8; }
    body[data-theme="forest"] { --bg:#0a1f0f; --bg2:#14391e; --text:#ecfdf5; --muted:#6ee7b7; --accent:#10b981; --accent2:#34d399; }
    body[data-theme="rose"]   { --bg:#1a0a10; --bg2:#3b0f20; --text:#fdf2f8; --muted:#f9a8d4; --accent:#ec4899; --accent2:#f472b6; }
    body[data-theme="slate"]  { --bg:#0f172a; --bg2:#1e293b; --text:#f8fafc; --muted:#94a3b8; --accent:#7c3aed; --accent2:#a78bfa; }
    body[data-theme="sand"]   { --bg:#faf6f0; --bg2:#f0e6d3; --text:#292524; --muted:#78716c; --accent:#b45309; --accent2:#d97706; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      width: 100vw; height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 64px;
      opacity: 0; transition: opacity .9s ease;
      pointer-events: none;
    }
    .slide.active { opacity: 1; pointer-events: auto; }

    /* Message / texte */
    .slide-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 7vw, 6.5rem);
      font-weight: 400;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 28px;
      color: var(--text);
    }
    .slide-body {
      font-size: clamp(1.2rem, 2.8vw, 2.2rem);
      font-weight: 300;
      text-align: center;
      color: var(--muted);
      max-width: 780px;
      line-height: 1.55;
    }

    /* Clock */
    .clock-time {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(6rem, 20vw, 18rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1;
      letter-spacing: -.02em;
    }
    .clock-date {
      font-size: clamp(1.4rem, 3.5vw, 3rem);
      color: var(--muted);
      margin-top: 20px;
      font-weight: 300;
      letter-spacing: .01em;
    }

    /* Ephemeris */
    .ephem-label {
      font-size: clamp(.9rem, 2vw, 1.5rem);
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 20px;
      font-weight: 400;
    }
    .ephem-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(4rem, 13vw, 11rem);
      font-weight: 400;
      color: var(--accent2);
      line-height: 1;
      text-align: center;
    }
    .ephem-date {
      font-size: clamp(1rem, 2.5vw, 2rem);
      color: var(--muted);
      margin-top: 24px;
      font-weight: 300;
    }

    /* Image */
    .slide-image { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
    .image-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 55%); }
    .image-caption {
      position:absolute; bottom:64px; left:64px; right:64px;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 4.5vw, 4rem);
      font-weight: 400; color:#fff;
    }

    /* Weather */
    .weather-city  { font-size:clamp(.9rem,2vw,1.6rem); color:var(--muted); text-transform:uppercase; letter-spacing:.14em; margin-bottom:10px; }
    .weather-icon  { font-size:clamp(3rem,9vw,7rem); margin:10px 0; }
    .weather-temp  { font-family:'DM Serif Display',serif; font-size:clamp(5rem,16vw,13rem); font-weight:400; color:var(--text); line-height:1; }
    .weather-desc  { font-size:clamp(1rem,2.5vw,2rem); color:var(--muted); margin-top:14px; font-weight:300; }

    /* Horoscope */
    .horoscope-sign  { font-size:clamp(2.5rem,7vw,5rem); margin-bottom:8px; }
    .horoscope-name  { font-family:'DM Serif Display',serif; font-size:clamp(1.8rem,4.5vw,3.5rem); color:var(--accent2); margin-bottom:28px; }
    .horoscope-text  { font-size:clamp(1rem,2.2vw,1.7rem); color:var(--muted); max-width:820px; text-align:center; line-height:1.65; font-weight:300; font-style:italic; }

    /* Progress */
    #progress-bar {
      position:fixed; bottom:0; left:0; height:3px;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      width:0%; transition:width linear; z-index:100;
    }

    /* Branding */
    #branding {
      position:fixed; bottom:14px; right:18px;
      font-size:12px; color:var(--muted); opacity:.35;
      letter-spacing:.06em; font-weight:500;
    }

    /* Loader */
    #loader {
      position:fixed; inset:0; background:var(--bg);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:20px; z-index:200;
    }
    .loader-logo { font-size:52px; }
    .loader-text { font-size:15px; color:var(--muted); }
    .spinner { width:34px; height:34px; border:3px solid var(--bg2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    #error-msg {
      position:fixed; inset:0; background:var(--bg);
      display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:16px;
    }
    #error-msg h2 { font-size:22px; color:#ef4444; }
    #error-msg p  { font-size:15px; color:var(--muted); }
  </style>
</head>

// ── State ──
const params  = new URLSearchParams(location.search);
const storeId = params.get('store');
let slides=[], duration=8, timer=null, currentIdx=0, clockInterval=null;

if (!storeId) {
  showError('Paramètre ?store= manquant dans l\'URL.');
} else {
  const storeRef = ref(db, `stores/${storeId}`);
  onValue(storeRef, snap => {
    if (!snap.exists()) {
      showError(`Établissement introuvable (id: ${storeId})`);
      return;
    }
    renderStore(snap.val());
  }, (err) => {
    console.error('Firebase read error:', err);
    showError('Erreur de connexion Firebase. Vérifiez les règles de sécurité.');
  });
}

async function renderStore(data) {
  document.body.dataset.theme = data.theme || 'dark';
  slides   = (data.slides||[]).filter(s=>s&&s.type);
  duration = parseInt(data.duration)||8;
  if (!slides.length) { showError('Aucune slide configurée.'); return; }
  await buildSlides();
  document.getElementById('loader').style.display = 'none';
  goTo(0);
}

async function buildSlides() {
  const container = document.getElementById('slides-container');
  container.innerHTML = '';
  for (let i=0; i<slides.length; i++) {
    const div = document.createElement('div');
    div.className = 'slide';
    div.id = `slide-${i}`;
    div.innerHTML = await buildSlideHTML(slides[i]);
    container.appendChild(div);
  }
}

async function buildSlideHTML(s) {
  const now = new Date();
  switch(s.type) {

    case 'clock':
      return `<div class="clock-time" id="clock-time">--:--</div>
              <div class="clock-date" id="clock-date"></div>`;

    case 'ephemeris': {
      const key  = `${now.getMonth()+1}-${now.getDate()}`;
      const name = SAINTS[key] || '—';
      const dateStr = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
      return `<div class="ephem-label">Aujourd'hui nous fêtons les</div>
              <div class="ephem-name">${name}</div>
              <div class="ephem-date">${dateStr}</div>`;
    }

    case 'image':
      return `<img class="slide-image" src="${s.image||''}" alt="" onerror="this.style.display='none'" />
              <div class="image-overlay"></div>
              ${s.title?`<div class="image-caption">${s.title}</div>`:''}`;

    case 'weather': {
      const city = s.city || 'Paris';
      const d = await fetchWeather(city);
      if (!d) return `<div class="slide-title">${city}</div><div class="slide-body">Météo indisponible</div>`;
      return `<div class="weather-city">${city}</div>
              <div class="weather-icon">${WMO[d.code]||'🌡️'}</div>
              <div class="weather-temp">${Math.round(d.temp)}°</div>
              <div class="weather-desc">${wmoDesc(d.code)}</div>`;
    }

    case 'horoscope': {
      const sign = s.sign || 'belier';
      const h = HOROSCOPES[sign];
      if (!h) return `<div class="slide-title">Horoscope</div>`;
      const day = now.getDate();
      const txt = h.texts[day % h.texts.length];
      return `<div class="horoscope-sign">${h.sign}</div>
              <div class="horoscope-name">${h.name} · ${h.dates}</div>
              <div class="horoscope-text">${txt}</div>`;
    }

    default: // message, custom
      return `${s.title?`<div class="slide-title">${s.title}</div>`:''}
              ${s.body?`<div class="slide-body">${s.body}</div>`:''}`;
  }
}

async function fetchWeather(city) {
  try {
    const gr = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=fr&format=json`);
    const geo = await gr.json();
    if (!geo.results?.length) return null;
    const {latitude,longitude} = geo.results[0];
    const wr = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=auto&forecast_days=1`);
    const w = await wr.json();
    return { temp:w.current_weather.temperature, code:w.current_weather.weathercode };
  } catch { return null; }
}

function goTo(idx) {
  document.querySelectorAll('.slide').forEach(el=>el.classList.remove('active'));
  const target = document.getElementById(`slide-${idx}`);
  if (!target) return;
  target.classList.add('active');
  currentIdx = idx;

  if (slides[idx]?.type==='clock') startClock(); else stopClock();

  const bar = document.getElementById('progress-bar');
  bar.style.transition='none'; bar.style.width='0%';
  requestAnimationFrame(()=>{ bar.style.transition=`width ${duration}s linear`; bar.style.width='100%'; });

  if (timer) clearTimeout(timer);
  timer = setTimeout(()=>goTo((currentIdx+1)%slides.length), duration*1000);
}

function startClock() {
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
}
function stopClock() {
  if (clockInterval) { clearInterval(clockInterval); clockInterval=null; }
}
function updateClock() {
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const el=document.getElementById('clock-time');
  const dl=document.getElementById('clock-date');
  if (el) el.textContent=`${h}:${m}`;
  if (dl) dl.textContent=now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

document.addEventListener('click',()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); });

function showError(msg) {
  document.getElementById('loader').style.display='none';
  const el=document.getElementById('error-msg');
  el.style.display='flex';
  if(msg) el.querySelector('p').textContent=msg;
  console.warn('WelcomScreen error:', msg || 'unknown');
}
</script>
