<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WelcomScreen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEMES ── */
    body[data-theme="dark"] {
      --bg: #0d1117; --bg2: #161b22;
      --text: #f1f5f9; --muted: #94a3b8;
      --accent: #6366f1; --accent2: #818cf8;
    }
    body[data-theme="light"] {
      --bg: #f8fafc; --bg2: #e2e8f0;
      --text: #0f172a; --muted: #64748b;
      --accent: #4f46e5; --accent2: #6366f1;
    }
    body[data-theme="warm"] {
      --bg: #1c0a00; --bg2: #451a03;
      --text: #fef3c7; --muted: #d97706;
      --accent: #f59e0b; --accent2: #fbbf24;
    }
    body[data-theme="ocean"] {
      --bg: #062032; --bg2: #0c4a6e;
      --text: #e0f2fe; --muted: #7dd3fc;
      --accent: #0ea5e9; --accent2: #38bdf8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      width: 100vw; height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* ── SLIDES ── */
    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px;
      opacity: 0;
      transition: opacity .8s ease;
      pointer-events: none;
    }
    .slide.active { opacity: 1; pointer-events: auto; }

    /* Message / custom */
    .slide-title {
      font-size: clamp(2.5rem, 7vw, 6rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 24px;
      background: linear-gradient(135deg, var(--text), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .slide-body {
      font-size: clamp(1.2rem, 3vw, 2.2rem);
      font-weight: 400;
      text-align: center;
      color: var(--muted);
      max-width: 800px;
      line-height: 1.5;
    }

    /* Clock */
    .clock-time {
      font-size: clamp(5rem, 18vw, 16rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
    }
    .clock-date {
      font-size: clamp(1.2rem, 3vw, 2.5rem);
      color: var(--muted);
      margin-top: 16px;
      font-weight: 300;
    }

    /* Ephemeris */
    .ephem-label {
      font-size: clamp(.9rem, 2vw, 1.4rem);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .15em;
      margin-bottom: 16px;
    }
    .ephem-name {
      font-size: clamp(3rem, 10vw, 9rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Image */
    .slide-image {
      width: 100%; height: 100%;
      object-fit: cover;
      position: absolute; inset: 0;
    }
    .image-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 60%);
    }
    .image-caption {
      position: absolute; bottom: 60px; left: 60px; right: 60px;
      font-size: clamp(1.5rem, 4vw, 3.5rem);
      font-weight: 700; color: #fff;
    }

    /* Weather */
    .weather-city {
      font-size: clamp(1rem, 2.5vw, 2rem);
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .12em; margin-bottom: 8px;
    }
    .weather-temp {
      font-size: clamp(5rem, 15vw, 12rem);
      font-weight: 700; line-height: 1;
      color: var(--text);
    }
    .weather-desc {
      font-size: clamp(1.2rem, 3vw, 2.5rem);
      color: var(--muted); margin-top: 12px;
    }

    /* ── PROGRESS BAR ── */
    #progress-bar {
      position: fixed; bottom: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%; transition: width linear;
      z-index: 100;
    }

    /* ── BRANDING ── */
    #branding {
      position: fixed; bottom: 16px; right: 20px;
      font-size: 11px; color: var(--muted);
      opacity: .4; letter-spacing: .05em;
    }

    /* ── ERROR / LOADER ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 200;
    }
    .loader-logo {
      font-size: 48px; margin-bottom: 8px;
    }
    .loader-text { font-size: 16px; color: var(--muted); }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--bg2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      position: fixed; inset: 0;
      background: var(--bg);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #error-msg h2 { font-size: 24px; color: #ef4444; }
    #error-msg p  { font-size: 16px; color: var(--muted); }
  </style>
</head>

// ── Weather icons (open-meteo WMO codes) ──
const WMO = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',

// ── Render ──
let timer = null;
let currentIdx = 0;
let slides = [];
let duration = 8;

function renderStore(data) {
  document.body.dataset.theme = data.theme || 'dark';
  slides   = (data.slides || []).filter(s => s && s.type);
  duration = parseInt(data.duration) || 8;

  if (!slides.length) { showError('Aucune slide configurée.'); return; }

  buildSlides();
  document.getElementById('loader').style.display = 'none';
  goTo(0);
}

async function buildSlides() {
  const container = document.getElementById('slides-container');
  container.innerHTML = '';

  for (let i = 0; i < slides.length; i++) {
    const s   = slides[i];
    const div = document.createElement('div');
    div.className = 'slide';
    div.id = `slide-${i}`;
    div.innerHTML = await buildSlideHTML(s);
    container.appendChild(div);
  }
}

async function buildSlideHTML(s) {
  switch (s.type) {

    case 'clock':
      return `<div class="clock-time" id="clock-time">00:00</div>
              <div class="clock-date" id="clock-date"></div>`;

    case 'ephemeris': {
      const now  = new Date();
      const key  = String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      const name = SAINTS[key] || '—';
      const dateStr = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
      return `<div class="ephem-label">Aujourd'hui, fête de</div>
              <div class="ephem-name">${name}</div>
              <div style="font-size:clamp(1rem,2.5vw,1.8rem);color:var(--muted);margin-top:20px">${dateStr}</div>`;
    }

    case 'image':
      return `<img class="slide-image" src="${s.image || ''}" alt="" onerror="this.style.display='none'" />
              <div class="image-overlay"></div>
              ${s.title ? `<div class="image-caption">${s.title}</div>` : ''}`;

    case 'weather': {
      const city = s.city || 'Paris';
      const data = await fetchWeather(city);
      if (!data) return `<div class="slide-title">${city}</div><div class="slide-body" style="color:var(--muted)">Météo indisponible</div>`;
      return `<div class="weather-city">${city}</div>
              <div style="font-size:clamp(3rem,10vw,8rem)">${WMO[data.code] || '🌡️'}</div>
              <div class="weather-temp">${Math.round(data.temp)}°</div>
              <div class="weather-desc">${data.desc}</div>`;
    }

    default: // message, custom
      return `${s.title ? `<div class="slide-title">${s.title}</div>` : ''}
              ${s.body  ? `<div class="slide-body">${s.body}</div>` : ''}`;
  }
}

async function fetchWeather(city) {
  try {
    const geoR = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=fr&format=json`);
    const geo  = await geoR.json();
    if (!geo.results?.length) return null;
    const { latitude, longitude } = geo.results[0];
    const wR = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=apparent_temperature&timezone=auto&forecast_days=1`);
    const w  = await wR.json();
    const cw = w.current_weather;
    return { temp: cw.temperature, code: cw.weathercode, desc: wmoDesc(cw.weathercode) };
  } catch { return null; }
}

function wmoDesc(code) {
  const d = {0:'Ciel dégagé',1:'Peu nuageux',2:'Partiellement nuageux',3:'Couvert',
    45:'Brouillard',48:'Brouillard givrant',51:'Bruine légère',53:'Bruine',55:'Bruine dense',
    61:'Pluie légère',63:'Pluie',65:'Pluie forte',71:'Neige légère',73:'Neige',75:'Neige forte',
    80:'Averses légères',81:'Averses',82:'Averses violentes',95:'Orage',96:'Orage avec grêle',99:'Orage fort'};
  return d[code] || '';
}

// ── Slideshow ──
function goTo(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(el => el.classList.remove('active'));
  const target = document.getElementById(`slide-${idx}`);
  if (!target) return;
  target.classList.add('active');
  currentIdx = idx;

  // Start clock if needed
  if (slides[idx]?.type === 'clock') startClock();
  else stopClock();

  // Progress bar
  const bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    bar.style.transition = `width ${duration}s linear`;
    bar.style.width = '100%';
  });

  if (timer) clearTimeout(timer);
  timer = setTimeout(() => goTo((currentIdx + 1) % slides.length), duration * 1000);
}

// ── Clock ──
let clockInterval = null;
function startClock() {
  updateClock();
  clockInterval = setInterval(updateClock, 1000);
}
function stopClock() {
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
}
function updateClock() {
  const now  = new Date();
  const h    = String(now.getHours()).padStart(2,'0');
  const m    = String(now.getMinutes()).padStart(2,'0');
  const s    = String(now.getSeconds()).padStart(2,'0');
  const el   = document.getElementById('clock-time');
  const del  = document.getElementById('clock-date');
  if (el) el.textContent = `${h}:${m}:${s}`;
  if (del) del.textContent = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

// ── Fullscreen on click ──
document.addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
});

// ── Error ──
function showError(msg) {
  document.getElementById('loader').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.style.display = 'flex';
  if (msg) el.querySelector('p').textContent = msg;
}
</script>
